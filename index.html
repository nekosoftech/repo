<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NekosofTech's Repo</title>
    <meta name="description" content="All tweaks from NekosofTech. Add this repository to your favorite package manager.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: rgba(255, 255, 255, 0.8);
            --surface-border: rgba(0, 0, 0, 0.05);
            --primary-color: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08), transparent 25%);
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 30px;
            overflow: hidden;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 0 20px var(--primary-glow);
            border: 1px solid var(--surface-border);
            padding: 10px;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #1e293b, #4338ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 60px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            gap: 8px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(white, transparent);
            opacity: 0.1;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-sileo { background: linear-gradient(135deg, #1c888e, #136970); box-shadow: 0 4px 15px rgba(28, 136, 142, 0.3); }
        .btn-zebra { background: linear-gradient(135deg, #1a1a1a, #333333); box-shadow: 0 4px 15px rgba(26, 26, 26, 0.3); }
        .btn-cydia { background: linear-gradient(135deg, #8B5F4D, #6b4738); box-shadow: 0 4px 15px rgba(139, 95, 77, 0.3); }
        
        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--surface-border), transparent);
        }

        .packages-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .package-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
        }

        .package-card:hover {
            transform: scale(1.01);
            border-color: rgba(99, 102, 241, 0.3);
            background: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .pkg-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pkg-icon {
            width: 50px;
            height: 50px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 1px solid var(--surface-border);
        }

        .pkg-details h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .pkg-details p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .pkg-version {
            font-size: 0.85rem;
            color: #4f46e5;
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer a {
            color: #4f46e5;
            text-decoration: none;
        }

        .loading-text {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Fallback icon colors */
        .icon-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .icon-purple { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
        .icon-emerald { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .icon-rose { background: rgba(244, 63, 94, 0.1); color: #f43f5e; }
        .icon-amber { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-wrapper">
                <img src="CydiaIcon.png" alt="NekosofTech Logo" class="logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%23e0e0e0\'/></svg>'">
            </div>
            <h1>NekosofTech</h1>
            <p class="subtitle">Experience premium tweaks designed to enhance and customize your iOS device to its fullest potential.</p>
        </div>

        <div class="btn-grid">
            <a href="sileo://source/https://nekosoftech.github.io/repo" class="btn btn-sileo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.9 6.13L15 15l4.89-3.92A7 7 0 0 1 11 20z"/><path d="M11 4a7 7 0 0 1 1.1 13.87L7 9l-4.89 3.92A7 7 0 0 1 11 4z"/></svg> 
                Sileo
            </a>
            <a href="zbra://sources/add/https://nekosoftech.github.io/repo" class="btn btn-zebra">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg> 
                Zebra
            </a>
            <a href="cydia://url/https://cydia.saurik.com/api/share#?source=https://nekosoftech.github.io/repo" class="btn btn-cydia">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> 
                Cydia
            </a>
        </div>

        <h2 class="section-title">Packages</h2>
        
        <div class="packages-list" id="packages-container">
            <div class="loading-text" id="loading-msg">Fetching tweaks...</div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 NekosofTech. Follow me on <a href="https://github.com/nekosoftech" target="_blank">GitHub</a>.</p>
    </footer>

    <script>
        const repoUrl = window.location.href.replace('index.html', '').replace(/\/$/, "");
        
        async function fetchPackages() {
            try {
                // Fetch the Packages file
                const response = await fetch(`${repoUrl}/Packages`);
                if (!response.ok) throw new Error('Packages file not found or inaccessible.');
                
                const text = await response.text();
                parseAndRenderPackages(text);
            } catch (error) {
                console.error(error);
                document.getElementById('loading-msg').innerHTML = 
                    'Repository active. Add to your package manager to view all tweaks!<br><br><small style="opacity:0.5">(Status: Packages file is currently building or not yet deployed via GitHub Pages)</small>';
            }
        }

        function parseAndRenderPackages(data) {
            const container = document.getElementById('packages-container');
            container.innerHTML = ''; // clear loading state
            
            // Split based on empty lines which separate APT packages
            const blocks = data.split('\n\n');
            const packages = [];
            
            for (let block of blocks) {
                if (!block.trim()) continue;
                
                const pkg = {};
                const lines = block.split('\n');
                let lastKey = '';
                
                for (let line of lines) {
                    if (line.startsWith(' ')) {
                        // Multiline description handling (basic)
                        if(lastKey) pkg[lastKey] += " " + line.trim();
                        continue;
                    }
                    
                    const splitIndex = line.indexOf(':');
                    if (splitIndex > -1) {
                        const key = line.substring(0, splitIndex).trim();
                        const value = line.substring(splitIndex + 1).trim();
                        pkg[key] = value;
                        lastKey = key;
                    }
                }
                
                if (pkg.Package && pkg.Name) {
                    packages.push(pkg);
                }
            }
            
            if (packages.length === 0) {
                container.innerHTML = '<div class="loading-text">No packages found.</div>';
                return;
            }
            
            // Random colors for icons when not present
            const colors = ['icon-blue', 'icon-purple', 'icon-emerald', 'icon-rose', 'icon-amber'];
            
            packages.sort((a,b) => a.Name.localeCompare(b.Name)).forEach((pkg, index) => {
                const colorClass = colors[index % colors.length];
                // Assuming standard Icon path if available, else letter
                const iconContent = pkg.Icon ? `<img src="${repoUrl}/${pkg.Icon}" style="width:100%;height:100%;border-radius:12px;object-fit:cover;">` : pkg.Name.charAt(0).toUpperCase();

                const card = document.createElement('div');
                card.className = 'package-card';
                card.innerHTML = `
                    <div class="pkg-info">
                        <div class="pkg-icon ${!pkg.Icon ? colorClass : ''}">
                            ${iconContent}
                        </div>
                        <div class="pkg-details">
                            <h3>${pkg.Name}</h3>
                            <p>${pkg.Description ? pkg.Description.substring(0, 60) + (pkg.Description.length > 60 ? '...' : '') : pkg.Package}</p>
                        </div>
                    </div>
                    <span class="pkg-version">v${pkg.Version}</span>
                `;
                container.appendChild(card);
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', fetchPackages);
    </script>
</body>
</html>
