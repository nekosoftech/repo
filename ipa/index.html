    <script>
        // IPA folders list — add new IPA folder names here
        const ipaFolders = ['aov-loader'];

        let allApps = [];

        function formatFileSize(bytes) {
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function createIpaCard(app) {
            return `
                <a href="#app=${app.folder}" class="package-card">
                    <div class="pkg-info">
                        <div class="pkg-icon"><img src="${app.folder}/logo.jpg" alt="${app.info.name}" onerror="this.src='../logo/CydiaIcon.png';"></div>
                        <div class="pkg-details">
                            <h3>${app.info.name}</h3>
                            <p>${app.info.shortDescription}</p>
                        </div>
                    </div>
                    <div class="pkg-price-tag">v${app.info.version}</div>
                </a>
            `;
        }

        function renderList(apps) {
            const grid = document.getElementById('ipa-grid');
            const count = document.getElementById('ipa-count');
            if (apps.length === 0) {
                grid.innerHTML = '<div class="no-results">Không tìm thấy IPA nào.</div>';
                count.textContent = '';
                return;
            }
            count.textContent = apps.length + ' ứng dụng';
            grid.innerHTML = apps.map(a => createIpaCard(a)).join('');
        }

        function renderDetail(folder) {
            const app = allApps.find(a => a.folder === folder);
            if (!app) return;
            const info = app.info;

            let featuresHtml = '';
            if (info.features && info.features.length) {
                featuresHtml = '<ul class="detail-features">' + info.features.map(f => `<li>${f}</li>`).join('') + '</ul>';
            }

            let changelogHtml = '';
            if (info.changelog && info.changelog.length) {
                changelogHtml = '<div class="changelog-section"><h3>Lịch sử cập nhật</h3>';
                for (const entry of info.changelog) {
                    changelogHtml += `
                        <div class="changelog-entry">
                            <div class="version-tag">v${entry.version} — ${entry.date}</div>
                            <ul>${entry.changes.map(c => `<li>${c}</li>`).join('')}</ul>
                        </div>`;
                }
                changelogHtml += '</div>';
            }

            let socialsHtml = '';
            if (info.socials) {
                socialsHtml = '<div class="social-row">';
                if (info.socials.telegram) {
                    socialsHtml += `<a href="${info.socials.telegram}" target="_blank" class="social-link">

                        Telegram</a>`;
                }
                if (info.socials.twitter) {
                    socialsHtml += `<a href="${info.socials.twitter}" target="_blank" class="social-link">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                        Twitter</a>`;
                }
                socialsHtml += '</div>';
            }

            document.getElementById('detail-card').innerHTML = `
                <div class="detail-header">
                    <div class="pkg-icon" style="flex-shrink:0;"><img src="${folder}/logo.jpg" alt="${info.name}" onerror="this.src='../logo/CydiaIcon.png';" style="width:100%;height:100%;object-fit:cover;"></div>
                    <div class="detail-info">
                        <h2>${info.name}</h2>
                        <div class="meta">v${info.version} &bull; ${info.developer}</div>
                    </div>
                </div>
                <div class="detail-description">${info.localizedDescription}</div>
                ${featuresHtml}
                <a href="${folder}/${app.fileName}" class="download-btn" download>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    Tải xuống IPA
                </a>
                <div class="file-size-info">${app.fileName} — ${formatFileSize(app.fileSize)}</div>
                ${changelogHtml}
                ${socialsHtml}
            `;
        }

        // Routing
        function handleRouting() {
            const hash = window.location.hash;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

            if (hash.startsWith('#app=')) {
                const folder = decodeURIComponent(hash.substring(5));
                renderDetail(folder);
                document.getElementById('view-detail').classList.add('active');
                document.getElementById('back-btn').href = '#';
            } else {
                document.getElementById('view-list').classList.add('active');
            }
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // Search
        let searchTimeout = null;
        function handleSearch(query) {
            query = query.trim().toLowerCase();
            if (!query) {
                renderList(allApps);
                return;
            }
            const filtered = allApps.filter(a =>
                a.info.name.toLowerCase().includes(query) ||
                a.info.shortDescription.toLowerCase().includes(query)
            );
            renderList(filtered);
        }

        // Hard-coded IPA data to avoid dynamic directory listing issues on GitHub Pages
        const ipaData = {
            'aov-loader': {
                fileName: 'AoV-Loader-H.DUN9-1.0-7.tipa',
                fileSize: 5827010
            }
        };

        async function init() {
            for (const folder of ipaFolders) {
                try {
                    const res = await fetch(`${folder}/info.json`);
                    if (!res.ok) continue;
                    const info = await res.json();
                    const data = ipaData[folder] || {};
                    allApps.push({
                        folder,
                        info,
                        fileName: data.fileName || 'app.ipa',
                        fileSize: data.fileSize || 0
                    });
                } catch (e) {
                    console.warn(`Failed loading ${folder}/info.json`, e);
                }
            }

            renderList(allApps);
            handleRouting();
            window.addEventListener('hashchange', handleRouting);

            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                // Only search in list view
                if (!window.location.hash.startsWith('#app=')) {
                    searchTimeout = setTimeout(() => handleSearch(searchInput.value), 200);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('footer-year').textContent = new Date().getFullYear();
            init();
        });
    </script>
</body>
</html>
